services:
  # Solo base de datos y cache en Docker.
  # Backend y Frontend corren directamente con Python y Node.

  postgres:
    image: postgres:16-alpine
    container_name: nutrivision_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nutrivision
      POSTGRES_PASSWORD: nutrivision_pass
      POSTGRES_DB: nutrivision_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nutrivision -d nutrivision_db"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: nutrivision_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  postgres_data:

networks:
  default:
    name: nutrivision_local
