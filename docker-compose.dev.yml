version: "3.9"

# Development overrides — use: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  postgres:
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    environment:
      DEBUG: "true"
      APP_ENV: development
      DATABASE_URL: postgresql+asyncpg://nutrivision:nutrivision_pass@postgres:5432/nutrivision_db
      DATABASE_URL_SYNC: postgresql://nutrivision:nutrivision_pass@postgres:5432/nutrivision_db
    volumes:
      - ./backend:/app
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      "
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      target: deps
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
