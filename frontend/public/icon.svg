<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Dark rounded square background -->
  <rect width="512" height="512" rx="96" fill="#0E1207"/>

  <!-- 3D Apple centered (apple viewBox 0 0 240 240, scaled to ~75% = 384px, offset 64px) -->
  <g transform="translate(64,64) scale(1.6)">
    <defs>
      <radialGradient id="body-v1" cx="34%" cy="26%" r="82%">
        <stop offset="0%" stop-color="#F4FFD6"/>
        <stop offset="22%" stop-color="#E0FF7A"/>
        <stop offset="55%" stop-color="#CFFF3F"/>
        <stop offset="82%" stop-color="#7AB405"/>
        <stop offset="100%" stop-color="#3A5800"/>
      </radialGradient>
      <radialGradient id="spec-v1" cx="30%" cy="22%" r="22%">
        <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.92"/>
        <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.25"/>
        <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="spec2-v1" cx="70%" cy="78%" r="18%">
        <stop offset="0%" stop-color="#F4FFD6" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#F4FFD6" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="leaf-v1" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#C9F567"/>
        <stop offset="60%" stop-color="#7AB405"/>
        <stop offset="100%" stop-color="#3A5800"/>
      </linearGradient>
      <radialGradient id="bite-v1" cx="40%" cy="35%" r="70%">
        <stop offset="0%" stop-color="#FFFCEB"/>
        <stop offset="55%" stop-color="#F4D88C"/>
        <stop offset="100%" stop-color="#8A6A1B"/>
      </radialGradient>
      <filter id="shadow-v1" x="-25%" y="-20%" width="150%" height="140%">
        <feGaussianBlur in="SourceAlpha" stdDeviation="3.5"/>
        <feOffset dx="0" dy="4" result="off"/>
        <feComponentTransfer>
          <feFuncA type="linear" slope="0.35"/>
        </feComponentTransfer>
        <feMerge>
          <feMergeNode/>
          <feMergeNode in="SourceGraphic"/>
        </feMerge>
      </filter>
      <clipPath id="aclip-v1">
        <path d="M 120 58 C 84 42, 48 60, 44 104 C 40 158, 84 206, 120 210 C 156 206, 200 158, 196 104 C 192 60, 156 42, 120 58 Z"/>
      </clipPath>
      <mask id="amask-v1" maskUnits="userSpaceOnUse" x="0" y="0" width="240" height="240">
        <rect width="240" height="240" fill="white"/>
        <circle cx="44" cy="132" r="26" fill="black"/>
      </mask>
    </defs>

    <!-- Shadow under apple -->
    <ellipse cx="120" cy="222" rx="78" ry="8" fill="#0E1207" opacity="0.18"/>

    <!-- Stem -->
    <path d="M124 44 C 124 32, 130 24, 138 20" stroke="#4A2F1B" stroke-width="6" stroke-linecap="round" fill="none"/>

    <!-- Leaf 1 -->
    <g transform="translate(138 20) rotate(-30)">
      <path d="M0 0 C 20 -10, 44 -4, 52 14 C 30 18, 8 12, 0 0 Z" fill="url(#leaf-v1)"/>
    </g>

    <!-- Leaf 2 -->
    <g transform="translate(126 38) rotate(20)">
      <path d="M0 0 C -14 -10, -32 -6, -40 10 C -22 14, -6 10, 0 0 Z" fill="url(#leaf-v1)" opacity="0.95"/>
    </g>

    <!-- Apple body with bite -->
    <g filter="url(#shadow-v1)">
      <g clip-path="url(#aclip-v1)">
        <circle cx="44" cy="132" r="27.04" fill="url(#bite-v1)"/>
        <circle cx="44" cy="132" r="24.7" fill="none" stroke="#8A6A1B" stroke-width="1.2" opacity="0.4"/>
      </g>
      <path d="M 120 58 C 84 42, 48 60, 44 104 C 40 158, 84 206, 120 210 C 156 206, 200 158, 196 104 C 192 60, 156 42, 120 58 Z" fill="url(#body-v1)" mask="url(#amask-v1)"/>
    </g>

    <!-- Specular highlights -->
    <g clip-path="url(#aclip-v1)">
      <ellipse cx="102" cy="86" rx="22" ry="32" transform="rotate(-15 102 86)" fill="url(#spec-v1)"/>
      <ellipse cx="150" cy="184" rx="22" ry="10" fill="url(#spec2-v1)"/>
    </g>
  </g>
</svg>
